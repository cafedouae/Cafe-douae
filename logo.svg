<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E2119"/>
      <stop offset="100%" stop-color="#1B1410"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C17A4F"/>
      <stop offset="50%" stop-color="#D4A24C"/>
      <stop offset="100%" stop-color="#C17A4F"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A24C"/>
      <stop offset="100%" stop-color="#C17A4F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#C17A4F" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="26" x2="200" y2="38"/>
    <line x1="200" y1="362" x2="200" y2="374"/>
    <line x1="26" y1="200" x2="38" y2="200"/>
    <line x1="362" y1="200" x2="374" y2="200"/>
    <line x1="76.3" y1="76.3" x2="84.8" y2="84.8"/>
    <line x1="315.2" y1="315.2" x2="323.7" y2="323.7"/>
    <line x1="323.7" y1="76.3" x2="315.2" y2="84.8"/>
    <line x1="84.8" y1="315.2" x2="76.3" y2="323.7"/>
  </g>

  <!-- Mid ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#C17A4F" stroke-width="0.5" opacity="0.2"/>

  <!-- Steam lines above cup — futuristic curved -->
  <g filter="url(#glow)" opacity="0.85">
    <path d="M170 138 C168 128, 178 120, 176 110" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200 132 C198 120, 208 112, 206 100" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M230 138 C228 128, 238 120, 236 110" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Cup body -->
  <g filter="url(#softglow)">
    <path d="M155 155 L165 250 Q200 265 235 250 L245 155 Z" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Cup top rim -->
    <ellipse cx="200" cy="155" rx="45" ry="8" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>
    <!-- Saucer -->
    <ellipse cx="200" cy="258" rx="55" ry="9" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
    <!-- Handle -->
    <path d="M245 175 Q272 175 272 205 Q272 235 245 235" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Inner surface glow dot -->
    <ellipse cx="200" cy="163" rx="20" ry="4" fill="#D4A24C" opacity="0.15"/>
  </g>

  <!-- Horizontal separator line -->
  <line x1="120" y1="290" x2="280" y2="290" stroke="url(#ringGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- CAFÉ text -->
  <text x="200" y="318"
    font-family="Georgia, serif"
    font-size="28"
    font-weight="400"
    letter-spacing="12"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)">CAFÉ</text>

  <!-- DOUAE text -->
  <text x="200" y="348"
    font-family="Georgia, serif"
    font-size="18"
    font-weight="400"
    letter-spacing="8"
    text-anchor="middle"
    fill="#C9BBA1"
    opacity="0.75">DOUAE</text>

  <!-- Corner geometric accents -->
  <g stroke="#C17A4F" stroke-width="1" opacity="0.35">
    <path d="M100 310 L100 340 L130 340"/>
    <path d="M300 310 L300 340 L270 340"/>
    <path d="M100 90 L100 60 L130 60"/>
    <path d="M300 90 L300 60 L270 60"/>
  </g>

  <!-- Center dot -->
  <circle cx="200" cy="200" r="2" fill="#D4A24C" opacity="0.3"/>
</svg>
